<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weilerer Hof Flohmärkte 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --red:    #d63b2f;
      --blue:   #5b7ec5;
      --orange: #e8813a;
      --green:  #4a9b6f;
      --yellow: #f0c040;
      --pink:   #e07090;
      --bg:     #faf8f3;
      --white:  #fffffe;
      --dark:   #2a2a2a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; display: flex; flex-direction: column; }
    header { background: var(--white); padding: 1.2rem 1rem 0.9rem; text-align: center; position: relative; overflow: hidden; border-bottom: 4px solid var(--red); }
    header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: linear-gradient(90deg, var(--orange) 0%, var(--red) 18%, var(--pink) 36%, var(--blue) 54%, var(--green) 72%, var(--yellow) 100%); }
    header h1 { font-family: 'Fredoka One', cursive; font-size: clamp(1.7rem, 6vw, 2.6rem); color: var(--blue); letter-spacing: 0.04em; line-height: 1.1; margin-top: 0.4rem; }
    header h1 em { color: var(--red); font-style: normal; }
    .event-info { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.5rem; margin: 0.65rem 0 0.35rem; }
    .pill { display: inline-flex; align-items: center; gap: 0.35rem; border-radius: 99px; padding: 0.3rem 0.9rem; font-size: 0.82rem; font-weight: 700; }
    .pill-red   { background: var(--red);   color: white; }
    .pill-blue  { background: var(--blue);  color: white; }
    .pill-green { background: var(--green); color: white; }
    .organizer { font-family: 'Fredoka One', cursive; font-size: 1.05rem; color: var(--green); margin-top: 0.45rem; letter-spacing: 0.02em; }
    #map { flex: 1; min-height: 52vh; width: 100%; z-index: 1; }
    .legend { background: var(--white); padding: 0.7rem 0.8rem 0.6rem; border-top: 4px solid var(--blue); }
    .legend h2 { font-family: 'Fredoka One', cursive; font-size: 1.05rem; color: var(--blue); margin-bottom: 0.5rem; }
    .map-legend { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 0.7rem; padding: 0.5rem 0.7rem; background: var(--bg); border-radius: 10px; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; font-weight: 700; }
    .legend-badge {
      display: inline-flex; align-items: center; justify-content: center;
      border: 2px solid white; border-radius: 6px;
      width: 34px; height: 22px;
      font-size: 0.7rem; font-weight: 900; color: white;
      font-family: sans-serif; letter-spacing: 0.05em;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }
    .standort-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.35rem; }
    .standort-card { display: flex; align-items: center; gap: 0.5rem; border-radius: 8px; padding: 0.35rem 0.6rem; cursor: pointer; transition: transform 0.18s, box-shadow 0.18s; border: 2px solid transparent; }
    .standort-card:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    .standort-card:nth-child(6n+1) { background: #fdecea; border-color: var(--red);    }
    .standort-card:nth-child(6n+2) { background: #e8eef9; border-color: var(--blue);   }
    .standort-card:nth-child(6n+3) { background: #fef3e2; border-color: var(--orange); }
    .standort-card:nth-child(6n+4) { background: #e6f4ed; border-color: var(--green);  }
    .standort-card:nth-child(6n+5) { background: #fdf6e3; border-color: var(--yellow); }
    .standort-card:nth-child(6n+6) { background: #fce8ef; border-color: var(--pink);   }
    .standort-card.active { box-shadow: 0 0 0 3px var(--blue); transform: translateY(-1px); }
    .standort-num { min-width: 22px; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Fredoka One', cursive; font-size: 0.75rem; color: white; flex-shrink: 0; }
    .standort-card:nth-child(6n+1) .standort-num { background: var(--red);    }
    .standort-card:nth-child(6n+2) .standort-num { background: var(--blue);   }
    .standort-card:nth-child(6n+3) .standort-num { background: var(--orange); }
    .standort-card:nth-child(6n+4) .standort-num { background: var(--green);  }
    .standort-card:nth-child(6n+5) .standort-num { background: var(--yellow); color: var(--dark); }
    .standort-card:nth-child(6n+6) .standort-num { background: var(--pink);   }
    .standort-info { font-size: 0.78rem; font-weight: 700; color: var(--dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    footer { background: var(--white); text-align: center; padding: 0.5rem; font-size: 0.72rem; color: #aaa; border-top: 4px solid transparent; border-image: linear-gradient(90deg, var(--orange), var(--red), var(--pink), var(--blue), var(--green), var(--yellow)) 1; }
    .leaflet-popup-content-wrapper { border-radius: 14px; border-top: 5px solid var(--red); font-family: 'Nunito', sans-serif; }
    .leaflet-popup-content { margin: 12px 14px; }
    .popup-title { font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--blue); }
    .popup-title.kita { color: var(--green); }
    .popup-title.parking { color: #555; }
    .popup-addr  { font-size: 0.8rem; color: #888; margin-top: 2px; }
    .popup-badge { display: inline-block; margin-top: 5px; font-size: 0.75rem; font-weight: 700; border-radius: 99px; padding: 2px 10px; }
    .popup-badge.kita    { background: #e6f4ed; color: var(--green); }
    .popup-badge.parking { background: #e8eef9; color: var(--blue);  }
  </style>
</head>
<body>

<header>
  <h1>Weilerer<br><em>Hof Flohmärkte</em></h1>
  <div class="event-info">
    <span class="pill pill-red">📅 Sa, 13. Juni 2026</span>
    <span class="pill pill-blue">🕙 11:00 – 17:00 Uhr</span>
    <span class="pill pill-green">📍 Hilsbach &amp; Weiler</span>
  </div>
  <div class="organizer">🌼 Ev. Kindergarten Gänseblümchen</div>
</header>

<div id="map"></div>

<div class="legend">
  <h2>🛍 Alle Standorte</h2>
  <div class="map-legend">
    <div class="legend-item"><span style="font-size:1.1rem">🔴</span> Flohmarkt-Standort</div>
    <div class="legend-item"><span style="font-size:1.1rem">🌼</span> Veranstalter (Kindergarten)</div>
    <div class="legend-item"><span style="font-size:1.1rem">🅿️</span> Parkplatz</div>
    <div class="legend-item">
      <span class="legend-badge" style="background:#2196a6;">WC</span> Toilette
    </div>
    <div class="legend-item">
      <span class="legend-badge" style="background:#e8813a; font-size:14px;">🍴</span> Verpflegung
    </div>
  </div>
  <div class="standort-list" id="standort-list"></div>
</div>

<footer>Karte: © <a href="https://www.openstreetmap.org/copyright" style="color:#aaa">OpenStreetMap</a>-Mitwirkende &nbsp;|&nbsp; Ev. Kindergarten Gänseblümchen</footer>

<script>
  const standorte = [
    { "adresse": "Am Schafgarten 7",        "lat": 49.2093017, "lng": 8.879023  },
    { "adresse": "Beckenwiesenweg 9",        "lat": 49.2069678, "lng": 8.8789685 },
    { "adresse": "Beckenwiesenweg 16",       "lat": 49.2059745, "lng": 8.8786874 },
    { "adresse": "Burggrafenstr. 12",        "lat": 49.209318,  "lng": 8.877961  },
    { "adresse": "Burggrafenstr. 17",        "lat": 49.2095322, "lng": 8.8781344 },
    { "adresse": "Elsbeereweg 3",            "lat": 49.2053434, "lng": 8.8769788 },
    { "adresse": "Elsbeereweg 6",            "lat": 49.2049925, "lng": 8.876976  },
    { "adresse": "Elsbeereweg 10",           "lat": 49.2047689, "lng": 8.8774288 },
    { "adresse": "Elsbeereweg 20",           "lat": 49.2043993, "lng": 8.8786002 },
    { "adresse": "Enzianstr. 2a",            "lat": 49.2074191, "lng": 8.876814  },
    { "adresse": "Enzianstr. 3",             "lat": 49.2071693, "lng": 8.8773599 },
    { "adresse": "Enzianstr. 4",             "lat": 49.2066126, "lng": 8.8770216 },
    { "adresse": "Fliederstr. 2",            "lat": 49.2045029, "lng": 8.8718988 },
    { "adresse": "Fürstenstr. 4",            "lat": 49.211394,  "lng": 8.875441  },
    { "adresse": "Fürstenstr. 7",            "lat": 49.2115361, "lng": 8.8753193 },
    { "adresse": "Ginsterstr. 9",            "lat": 49.207185,  "lng": 8.8769151 },
    { "adresse": "Grötzenstr. 1",            "lat": 49.2135892, "lng": 8.8721341 },
    { "adresse": "Grötzenstr. 7",            "lat": 49.2136167, "lng": 8.8710745 },
    { "adresse": "Hälde 7",                  "lat": 49.2146579, "lng": 8.8715043 },
    { "adresse": "Holunderweg 6",            "lat": 49.2118437, "lng": 8.8763389 },
    { "adresse": "Kaiserstr. 16",            "lat": 49.2076632, "lng": 8.875399  },
    { "adresse": "Kaiserstr. 41",            "lat": 49.2096032, "lng": 8.8759698 },
    { "adresse": "Kaiserstr. 54",            "lat": 49.2112849, "lng": 8.8746487 },
    { "adresse": "Kaiserstr. 56",            "lat": 49.2115144, "lng": 8.8746708 },
    { "adresse": "Kaiserstr. 60",            "lat": 49.211504,  "lng": 8.8742484 },
    { "adresse": "Kaiserstr. 90",            "lat": 49.213634,  "lng": 8.8727357 },
    { "adresse": "Kornblumenstr. 4",         "lat": 49.2053332, "lng": 8.8743501 },
    { "adresse": "Kornblumenstr. 6",         "lat": 49.2051153, "lng": 8.8740034 },
    { "adresse": "Kornblumenstr. 8",         "lat": 49.2050017, "lng": 8.8737974 },
    { "adresse": "Reihener Str. 3a",         "lat": 49.2080528, "lng": 8.8764738 },
    { "adresse": "Reihenerstr. 10",          "lat": 49.2078,    "lng": 8.8772    },
    { "adresse": "Rohräckerstr. 18",         "lat": 49.2060727, "lng": 8.8773155 },
    { "adresse": "Rohräckerstr. 26",         "lat": 49.206428,  "lng": 8.878638  },
    { "adresse": "Schafgasse 11",            "lat": 49.2104134, "lng": 8.8777988 },
    { "adresse": "Schafgasse 16",            "lat": 49.2103024, "lng": 8.8782227 },
    { "adresse": "Spervogelstr. 3",          "lat": 49.2147378, "lng": 8.8723755 },
    { "adresse": "Unter der Kelter 6",       "lat": 49.2102854, "lng": 8.8799671 },
    { "adresse": "Unter der Kelter 8a",      "lat": 49.2105335, "lng": 8.8796253 },
    { "adresse": "Von Öttingenstr. 45",      "lat": 49.2040678, "lng": 8.8752566 },
    { "adresse": "Von-Venningen-Str. 10",    "lat": 49.2049091, "lng": 8.8750602 },
    { "adresse": "Von-Venningen-Str. 19",    "lat": 49.2038861, "lng": 8.8743773 },
    { "adresse": "Waldangellocher Str. 1",   "lat": 49.208914,  "lng": 8.875448  },
    { "adresse": "Waldangellocherstr. 1a",   "lat": 49.208914,  "lng": 8.875448  },
    { "adresse": "Weinbergstrasse 5",        "lat": 49.2104763, "lng": 8.879157  }
  ];

  const parkplaetze = [
    { name: "Parkplatz Ev. Kirche Weiler",    adresse: "Schafgasse, Weiler",            lat: 49.210790,  lng: 8.876835  },
    { name: "Parkplatz Fliederstraße",        adresse: "Fliederstraße, Weiler",         lat: 49.204238,  lng: 8.873265  },
    { name: "Parkplatz Alte Kelter",          adresse: "Weinbergstraße, Weiler",        lat: 49.211588,  lng: 8.878358  },
    { name: "Parkplatz FC Weiler",            adresse: "Zum Steinbruch, Weiler",        lat: 49.217264,  lng: 8.872222  },
    { name: "Friedhof-Parkplatz Weiler",      adresse: "Kaiserstraße 3A, Weiler",       lat: 49.2067174, lng: 8.873426  },
    { name: "Parkplatz Kornblumenstraße",     adresse: "Kornblumenstraße 4, Weiler",    lat: 49.2053987, lng: 8.8745918 },
    { name: "Parkplatz Ortsmitte",            adresse: "Kaiserstraße, Weiler",          lat: 49.211143,  lng: 8.874386  },
    { name: "Parkplatz Burg Steinsberg",      adresse: "Weinbergstraße, Hilsbach",      lat: 49.2148998, lng: 8.8764047 },
    { name: "Parkplatz Hilsbach",             adresse: "Hilsbach",                      lat: 49.200334,  lng: 8.8716343 }
  ];

  const kindergarten = {
    name: "Ev. Kindergarten Gänseblümchen",
    adresse: "Burggrafenstraße 12, Weiler",
    lat: 49.2089932,
    lng: 8.8780397
  };

  const colours = ['#d63b2f','#5b7ec5','#e8813a','#4a9b6f','#f0c040','#e07090'];

  const map = L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>-Mitwirkende',
    maxZoom: 19
  }).addTo(map);

  const allMarkers = [];
  const listEl     = document.getElementById('standort-list');
  let activeCard   = null;

  // Hilfsfunktion: einheitlicher Schild-Stil
  const schild = (bg, inhalt, fontSize='11px') =>
    `<div style="background:${bg};border:2px solid white;border-radius:6px;width:34px;height:22px;` +
    `box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;` +
    `font-size:${fontSize};font-weight:900;color:white;font-family:sans-serif;letter-spacing:0.05em;">${inhalt}</div>`;

  // Kindergarten-Marker
  const kitaIcon = L.divIcon({
    className: '',
    html: `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
        <div style="background:#4a9b6f;border:3px solid white;border-radius:50%;width:40px;height:40px;
          box-shadow:0 3px 12px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;
          font-size:20px;line-height:1;">🌼</div>
        <div style="display:flex;gap:3px;">
          ${schild('#2196a6', 'WC')}
          ${schild('#e8813a', '🍴', '14px')}
        </div>
      </div>`,
    iconSize: [75, 68], iconAnchor: [37, 68], popupAnchor: [0, -70]
  });

  const kitaMarker = L.marker([kindergarten.lat, kindergarten.lng], { icon: kitaIcon }).addTo(map);
  kitaMarker.bindPopup(`
    <div class="popup-title kita">🌼 ${kindergarten.name}</div>
    <div class="popup-addr">📍 ${kindergarten.adresse}</div>
    <div style="margin-top:6px;font-size:0.82rem;font-weight:700;color:#4a9b6f;">🍽️ Verpflegung vor Ort</div>
    <div style="font-size:0.78rem;color:#555;margin-top:3px;line-height:1.7;">
      ☕ Kaffee &amp; Kuchen &nbsp;|&nbsp; 🧇 Waffeln<br>
      🌭 Heiße Würste &nbsp;|&nbsp; 🥤 Getränke
    </div>
    <div style="margin-top:6px;font-size:0.82rem;font-weight:700;color:#4a6fa5;">🚻 WC vorhanden</div>
    <div style="margin-top:5px;"><span class="popup-badge kita">Veranstalter</span></div>`);
  allMarkers.push(kitaMarker);

  // Parkplätze
  parkplaetze.forEach(p => {
    const icon = L.divIcon({
      className: '',
      html: `<div style="background:#4a6fa5;border:3px solid white;border-radius:8px;width:34px;height:34px;
        box-shadow:0 3px 10px rgba(0,0,0,0.28);display:flex;align-items:center;justify-content:center;
        font-size:16px;line-height:1;">🅿️</div>`,
      iconSize: [34, 34], iconAnchor: [17, 17], popupAnchor: [0, -19]
    });
    const m = L.marker([p.lat, p.lng], { icon }).addTo(map);
    m.bindPopup(`
      <div class="popup-title parking">🅿️ ${p.name}</div>
      <div class="popup-addr">📍 ${p.adresse}</div>
      <div><span class="popup-badge parking">Kostenlos parken</span></div>`);
    allMarkers.push(m);
  });

  // Standorte
  standorte.forEach((s, i) => {
    const num     = i + 1;
    const col     = colours[i % colours.length];
    const textCol = col === '#f0c040' ? '#2a2a2a' : 'white';
    const icon = L.divIcon({
      className: '',
      html: `<div style="background:${col};border:3px solid white;border-radius:50% 50% 50% 0;
          transform:rotate(-45deg);width:34px;height:34px;
          box-shadow:0 3px 10px rgba(0,0,0,0.28);
          display:flex;align-items:center;justify-content:center;">
          <span style="transform:rotate(45deg);color:${textCol};
          font-family:'Fredoka One',cursive;font-size:13px;line-height:1;">${num}</span></div>`,
      iconSize: [34, 34], iconAnchor: [17, 34], popupAnchor: [0, -36]
    });
    const marker = L.marker([s.lat, s.lng], { icon }).addTo(map);
    marker.bindPopup(`
      <div class="popup-title">Standort ${num}</div>
      <div class="popup-addr">📍 ${s.adresse}</div>`);
    allMarkers.push(marker);

    const card = document.createElement('div');
    card.className = 'standort-card';
    card.innerHTML = `<div class="standort-num">${num}</div><div class="standort-info">${s.adresse}</div>`;
    card.addEventListener('click', () => {
      if (activeCard) activeCard.classList.remove('active');
      card.classList.add('active');
      activeCard = card;
      document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'start' });
      setTimeout(() => { map.setView([s.lat, s.lng], 18); marker.openPopup(); }, 400);
    });
    listEl.appendChild(card);
  });

  map.on('popupclose', () => {
    if (activeCard) { activeCard.classList.remove('active'); activeCard = null; }
  });

  const group = L.featureGroup(allMarkers);
  map.fitBounds(group.getBounds().pad(0.12));
</script>
</body>
</html>
